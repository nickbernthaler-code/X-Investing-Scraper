<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Investing Scraper</title>
  <!-- Link to external stylesheet for all visual styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header section: main title and run button -->
  <header>
    <h1>X Investing Scraper</h1>
    <p>Stock ideas from top X accounts, re-analyzed with AI</p>
    <!-- Button that triggers the full scraping + analysis pipeline -->
    <button id="run-btn" onclick="runScraper()" style="margin-top:12px; padding:10px 24px; background:#0f3460; color:white; border:none; border-radius:6px; cursor:pointer; font-size:1rem;">
      Run Scraper
    </button>
  </header>

  <main>

    <!-- Latest Posts feed — populated dynamically by app.js -->
    <section>
      <h2>Latest Posts</h2>
      <div id="posts-container">
        <p class="empty-state">Click "Run Scraper" to fetch posts.</p>
      </div>
    </section>

    <!-- Portfolio section — populated dynamically by app.js -->
    <section style="margin-top: 40px;">
      <h2>My Portfolio</h2>
      <div id="portfolio-container">
        <p class="empty-state">No positions yet. Add stocks via the API.</p>
      </div>
    </section>

    <!-- Tracked Accounts section — populated dynamically by app.js -->
    <section style="margin-top: 40px;">
      <h2>Tracked Accounts</h2>
      <div id="accounts-container">
        <p class="empty-state">No accounts tracked yet.</p>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer style="margin-top:60px; text-align:center; color:#7a7a8e; padding:20px 0; border-top: 1px solid #0f3460;">
    <p>X Investing Scraper — Powered by Claude AI</p>
  </footer>

  <!-- Frontend JavaScript — loaded last so the HTML is ready first -->
  <script src="app.js"></script>

</body>
</html>
